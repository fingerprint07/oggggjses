<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outlook</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='2' y='4' width='20' height='16' rx='2' fill='%230078D4'/><path d='M2 6l10 7 10-7' stroke='white' stroke-width='2' fill='none'/></svg>">
  
  <!-- Quill Rich Text Editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/mailbox-outlook.css">
</head>
<body>
  <script>
    // Check authentication
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const hasToken = urlParams.get('token');
      const isAuthenticated = localStorage.getItem('mailbox_auth') === 'true';
      const isBypassed = localStorage.getItem('mailbox_bypass') === 'true';
      
      if (!hasToken && !isAuthenticated && !isBypassed) {
        window.location.href = '/mailbox-login.html';
      }
    })();
  </script>

  <!-- Top Navigation Bar -->
  <header class="outlook-header">
    <div class="header-left">
      <button class="waffle-menu" title="App launcher">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <circle cx="4" cy="4" r="1.5"/><circle cx="10" cy="4" r="1.5"/><circle cx="16" cy="4" r="1.5"/>
          <circle cx="4" cy="10" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="16" cy="10" r="1.5"/>
          <circle cx="4" cy="16" r="1.5"/><circle cx="10" cy="16" r="1.5"/><circle cx="16" cy="16" r="1.5"/>
        </svg>
      </button>
      <div class="app-branding">
        <svg class="outlook-logo" width="24" height="24" viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="16" rx="2" fill="#0078D4"/>
          <path d="M2 6L12 13L22 6" stroke="white" stroke-width="2" fill="none"/>
        </svg>
        <span class="app-title">Outlook</span>
      </div>
    </div>
    
    <div class="header-center">
      <div class="search-container">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search mail and people" onkeyup="searchEmails()">
      </div>
    </div>
    
    <div class="header-right">
      <button class="header-icon-btn" title="Settings" onclick="showSettings()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"/>
        </svg>
      </button>
      <button class="header-icon-btn" title="Help">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z"/>
        </svg>
      </button>
      <button class="header-icon-btn" title="Notifications">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/>
        </svg>
      </button>
      <div class="user-menu">
        <div class="user-avatar" id="userAvatar">?</div>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <div class="outlook-container">
    <!-- Left Sidebar -->
    <aside class="outlook-sidebar">
      <button class="new-message-btn" onclick="showComposeModal()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
          <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
        </svg>
        New message
      </button>
      
      <nav class="folder-nav">
        <div class="folder-section">
          <div class="section-label">Favorites</div>
          <div id="favoriteFolders"></div>
        </div>
        
        <div class="folder-section">
          <div class="section-label">Folders</div>
          <div id="allFolders">
            <div class="loading-text">Loading folders...</div>
          </div>
        </div>
      </nav>
    </aside>

    <!-- Email List Panel -->
    <main class="email-list-container">
      <div class="list-toolbar">
        <div class="toolbar-left">
          <button class="toolbar-btn" id="selectModeBtn" title="Select" onclick="toggleSelectionMode()">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/>
            </svg>
          </button>
          <div class="toolbar-divider"></div>
          <button class="toolbar-btn" title="Archive" onclick="showNotification('Select an email first', 'info')">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4z"/><path fill-rule="evenodd" d="M3 8h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V8zm5 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/>
            </svg>
          </button>
          <button class="toolbar-btn" title="Move to" onclick="showNotification('Select an email first', 'info')">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
            </svg>
          </button>
          <button class="toolbar-btn" title="Flag" onclick="showNotification('Select an email first', 'info')">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 00-1 1v3a1 1 0 11-2 0V6z"/>
            </svg>
          </button>
          <button class="toolbar-btn" title="Mark as read" onclick="showNotification('Select an email first', 'info')">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
            </svg>
          </button>
        </div>
        <div class="toolbar-right">
          <button class="toolbar-btn" title="Refresh" onclick="refreshEmails()">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"/>
            </svg>
          </button>
          <button class="toolbar-btn" title="Filter" onclick="toggleFilterMenu()">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L12 11.414V15a1 1 0 01-.293.707l-2 2A1 1 0 018 17v-5.586L3.293 6.707A1 1 0 013 6V3z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="list-header">
        <h1 class="folder-title" id="folderTitle">Inbox</h1>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterEmails('all')">All</button>
          <button class="filter-tab" onclick="filterEmails('unread')">Unread</button>
          <button class="filter-tab" onclick="filterEmails('flagged')">Flagged</button>
        </div>
      </div>

      <div class="email-list" id="emailList">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading emails...</p>
        </div>
      </div>
    </main>

    <!-- Reading Pane -->
    <article class="reading-pane" id="readingPane">
      <div class="empty-reading-pane">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 6l10 7 10-7"/>
        </svg>
        <h2>Select an item to read</h2>
        <p>Nothing is selected</p>
      </div>
    </article>
  </div>

  <!-- Profile Switcher Button -->
  <button class="profile-switcher-fab" onclick="toggleProfileSwitcher()" title="Switch Profiles">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
      <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
    </svg>
  </button>

  <!-- Profile Switcher Panel -->
  <div class="profile-panel" id="profilePanel">
    <div class="panel-header">
      <h3>Switch Profile</h3>
      <button class="panel-close-btn" onclick="toggleProfileSwitcher()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
        </svg>
      </button>
    </div>
    <div class="profile-list" id="profileList">
      <div class="loading-text">Loading profiles...</div>
    </div>
  </div>

  <!-- Compose Modal -->
  <div class="modal-overlay" id="composeModal">
    <div class="modal-dialog compose-dialog">
      <div class="modal-header">
        <h2>New message</h2>
        <div class="modal-actions">
          <button class="modal-icon-btn" title="Minimize">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/>
            </svg>
          </button>
          <button class="modal-icon-btn" onclick="closeComposeModal()">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="modal-body">
        <div class="compose-field">
          <label>To</label>
          <input type="email" id="composeTo" placeholder="Enter recipients">
          <div class="compose-actions">
            <button class="link-btn" onclick="toggleCc()">Cc</button>
            <button class="link-btn" onclick="toggleBcc()">Bcc</button>
          </div>
        </div>
        <div class="compose-field hidden" id="ccField">
          <label>Cc</label>
          <input type="email" id="composeCc" placeholder="Cc">
        </div>
        <div class="compose-field hidden" id="bccField">
          <label>Bcc</label>
          <input type="email" id="composeBcc" placeholder="Bcc">
        </div>
        <div class="compose-field">
          <label>Subject</label>
          <input type="text" id="composeSubject" placeholder="Add a subject">
        </div>
        <div class="compose-editor">
          <div id="composeBody"></div>
        </div>
        <div class="compose-attachments" id="composeAttachments" style="display: none;">
          <div class="attachments-label">Attachments:</div>
          <div id="attachmentsList"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="sendEmail()">Send</button>
        <label class="btn-secondary" style="cursor: pointer; display: inline-flex; align-items: center; gap: 8px;">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a3 3 0 00-3 3v4a5 5 0 0010 0V7a1 1 0 112 0v4a7 7 0 11-14 0V7a5 5 0 0110 0v4a3 3 0 11-6 0V7a1 1 0 012 0v4a1 1 0 102 0V7a3 3 0 00-3-3z"/>
          </svg>
          Attach
          <input type="file" id="attachmentInput" multiple style="display: none;" onchange="handleAttachments(this.files)">
        </label>
        <button class="btn-secondary" onclick="closeComposeModal()">Discard</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal-dialog settings-dialog">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-icon-btn" onclick="closeSettings()">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="settings-tabs">
          <button class="settings-tab-btn active" onclick="showSettingsTab('general')">General</button>
          <button class="settings-tab-btn" onclick="showSettingsTab('rules')">Rules</button>
          <button class="settings-tab-btn" onclick="showSettingsTab('folders')">Folders</button>
        </div>
        <div class="settings-content" id="settingsContent">
          <div class="loading-text">Loading settings...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Move to Folder Modal -->
  <div class="modal-overlay" id="moveFolderModal">
    <div class="modal-dialog" style="max-width: 500px;">
      <div class="modal-header">
        <h2>Move to folder</h2>
        <button class="modal-icon-btn" onclick="closeMoveFolder()">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="folderListMove" class="folder-list-move"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeMoveFolder()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Archive Confirmation Modal -->
  <div class="modal-overlay" id="archiveModal">
    <div class="modal-dialog" style="max-width: 400px;">
      <div class="modal-header">
        <h2>Archive email</h2>
        <button class="modal-icon-btn" onclick="closeArchiveModal()">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p>Move this email to the Archive folder?</p>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="confirmArchive()">Archive</button>
        <button class="btn-secondary" onclick="closeArchiveModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Notification Toast -->
  <div class="toast-notification" id="toastNotification"></div>

  <!-- Quill Rich Text Editor -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script src="/js/mailbox-outlook.js"></script>
</body>
</html>
