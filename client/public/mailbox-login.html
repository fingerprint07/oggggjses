<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outlook - Sign In</title>
  <link rel="stylesheet" href="mailbox.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0078d4 0%, #106ebe 100%);
      font-family: 'Segoe UI', sans-serif;
    }
    
    .login-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      animation: slideUp 0.4s ease-out;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-logo svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
    }
    
    .login-title {
      font-size: 24px;
      font-weight: 600;
      color: #2c2c2c;
      text-align: center;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      font-size: 14px;
      color: #6e6e6e;
      text-align: center;
      margin-bottom: 32px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #2c2c2c;
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 15px;
      transition: all 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #0078d4;
      box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .login-btn:hover {
      background: #106ebe;
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .footer-text {
      text-align: center;
      margin-top: 24px;
      color: #6e6e6e;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-logo">
        <svg viewBox="0 0 20 20" fill="#0078d4">
          <rect x="2" y="4" width="16" height="12" rx="2" stroke="#0078d4" stroke-width="2" fill="white"/>
          <path d="M2 6L10 11L18 6" stroke="#0078d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      
      <h1 class="login-title">Outlook Mail</h1>
      <p class="login-subtitle">Sign in to access your mailbox</p>
      
      <div id="errorMessage" class="error-message"></div>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required autofocus>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      </form>
      
      <p class="footer-text">
        © 2026 Microsoft Corporation
      </p>
    </div>
  </div>
  
  <script>
    async function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');
      
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';
      
      try {
        const response = await fetch('/api/mailbox/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('mailbox_auth', 'true');
          localStorage.setItem('mailbox_user', username);
          window.location.href = '/mailbox-outlook.html';
        } else {
          errorMessage.textContent = 'Invalid username or password';
          errorMessage.classList.add('show');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
          
          setTimeout(() => {
            errorMessage.classList.remove('show');
          }, 3000);
        }
      } catch (error) {
        console.error('Login error:', error);
        errorMessage.textContent = 'Login failed. Please try again.';
        errorMessage.classList.add('show');
      }
      
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    }
    
    // Check if already logged in
    if (localStorage.getItem('mailbox_auth') === 'true') {
      window.location.href = '/mailbox-outlook.html';
    }
  </script>
</body>
</html>
